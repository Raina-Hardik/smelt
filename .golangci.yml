version: "2"

run:
  build-tags:
    - integration

linters:
  # The default set (errcheck, govet, ineffassign, staticcheck, unused) plus:
  enable:
    - misspell
    - unconvert
  settings:
    misspell:
      ignore-rules:
        - hardlinked # established term (rsync et al.), not a misspelling of "hardline"

formatters:
  enable:
    - gofmt
    - goimports
