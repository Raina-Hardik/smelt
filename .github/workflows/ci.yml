name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: golangci-lint run ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, lint]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    strategy:
      fail_fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset: smelt-linux-amd64
          - goos: linux
            goarch: arm64
            asset: smelt-linux-arm64
          - goos: windows
            goarch: amd64
            asset: smelt-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            asset: smelt-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset: smelt-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/Raina-Hardik/smelt/cmd.version=${GITHUB_REF_NAME}" \
            -o "${{ matrix.asset }}" .
      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
